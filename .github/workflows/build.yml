name: QuantumShop CI/CD

on:
  push:
    branches: [main]

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - product-service
          - basket-service
          - user-service
          - auth-service
          - gateway-service
          - discovery-service

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build service
        run: |
          cd ${{ matrix.service }}
          mvn clean package -DskipTests

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest \
          ./${{ matrix.service }}

      - name: Push Docker image
        run: |
          docker push \
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest